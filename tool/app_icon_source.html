<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      html,
      body {
        width: 1024px;
        height: 1024px;
        margin: 0;
        overflow: hidden;
        background: #07111d;
      }

      body {
        display: grid;
        place-items: center;
      }

      .icon {
        width: 900px;
        height: 900px;
        display: grid;
        place-items: center;
      }

      img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 22px 42px rgba(0, 0, 0, 0.38));
      }
    </style>
  </head>
  <body>
    <main class="icon">
      <img src="../assets/images/logo_app.svg" alt="">
    </main>
  </body>
</html>
